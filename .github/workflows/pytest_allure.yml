name: pytest-playwright-allure

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Node (for allure-commandline)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Install Allure CLI (npm package)
        run: |
          # Use a stable version; adjust if needed
          npm install -g allure-commandline@2.20.1

      - name: Run tests (write Allure results)
        run: |
          pytest --alluredir=allure-results -q

      - name: Generate Allure HTML report
        run: |
          # Generate HTML from allure-results into allure-report
          allure generate allure-results -o allure-report --clean

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report