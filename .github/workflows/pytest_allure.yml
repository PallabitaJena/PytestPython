name: pytest-playwright-allure

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Node (for allure-commandline)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Run tests (write Allure results)
        env:
          BROWSER: ${{ matrix.browser }}
          HEADLESS: "true"
        run: |
          pytest playwright -q --alluredir=allure-results -k "not skip_in_ci" -o log_cli=true

      - name: Copy Allure config files (optional)
        run: |
          if [ -d "allure-config" ]; then
            cp -v allure-config/* allure-results/ || true
          fi

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline@2.20.1

      - name: Generate Allure HTML report
        run: |
          allure generate allure-results -o allure-report --clean

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
